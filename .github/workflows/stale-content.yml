name: Stale Content Alert

on:
  schedule:
    # First of each month, 9am UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find stale content
        id: stale
        run: |
          python3 - <<'PYEOF'
          import subprocess, json, os
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          cutoff = (datetime.now(timezone.utc) - timedelta(days=60)).strftime("%Y-%m-%d")
          stale = []

          for f in sorted(Path(".").rglob("*.html")):
              rel = str(f)
              if rel.startswith(".github") or rel.startswith("node_modules"):
                  continue
              # Get last git commit date for this file
              result = subprocess.run(
                  ["git", "log", "-1", "--format=%ci", "--", rel],
                  capture_output=True, text=True
              )
              if result.stdout.strip():
                  date = result.stdout.strip()[:10]
                  if date < cutoff:
                      stale.append({"file": rel, "last_modified": date})

          with open("/tmp/stale.json", "w") as f:
              json.dump(stale, f)

          print(f"Found {len(stale)} stale files (>60 days)")
          if stale:
              print("has_stale=true" )
          else:
              print("has_stale=false")

          # Write for GH output
          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write(f"count={len(stale)}\n")
          PYEOF

      - name: Create issue if stale content found
        if: steps.stale.outputs.count > 0
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const stale = JSON.parse(fs.readFileSync('/tmp/stale.json', 'utf8'));
            if (stale.length === 0) return;
            let body = `## Stale Content Report\n\n`;
            body += `${stale.length} files haven't been updated in 60+ days:\n\n`;
            body += `| File | Last Modified |\n|------|---------------|\n`;
            for (const s of stale.slice(0, 30)) {
              body += `| \`${s.file}\` | ${s.last_modified} |\n`;
            }
            body += `\n_Auto-generated by Stale Content Alert_`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'stale-content', state: 'open'
            });
            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues.data[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `${stale.length} pages need refresh (60+ days stale)`, body,
                labels: ['stale-content']
              });
            }
