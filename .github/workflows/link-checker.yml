name: Link Checker

on:
  schedule:
    # Every Wednesday 8am UTC
    - cron: '0 8 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --exclude-mail
            --exclude 'linkedin.com'
            --exclude 'medium.com/@issdandavis'
            --timeout 30
            --max-retries 2
            './**/*.html'
          fail: false

      - name: Report broken links
        if: env.lychee_exit_code != 0
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = '## Broken Link Report\n\n';
            try {
              const report = fs.readFileSync('./lychee/out.md', 'utf8');
              body += report;
            } catch {
              body += 'Lychee report not found — check workflow logs.';
            }
            body += '\n\n_Auto-generated by Link Checker workflow_';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'broken-links', state: 'open'
            });
            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues.data[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: 'Broken links detected', body,
                labels: ['broken-links']
              });
            }
