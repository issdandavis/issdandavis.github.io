<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Rabbit Hole | SCBE Research Explorer</title>
  <meta name="description" content="An infinite-zoom exploration of SCBE-AETHERMOORE research. Six Sacred Tongues. Dozens of discoveries. How deep does it go?">
  <meta property="og:title" content="The Rabbit Hole &#8212; SCBE Research Explorer">
  <meta property="og:description" content="Zoom into the research. Six Sacred Tongues. Dozens of discoveries. How deep does it go?">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aethermoorgames.com/research/rabbit-hole.html">
  <link rel="canonical" href="https://aethermoorgames.com/research/rabbit-hole.html">
  <style>
    :root{--bg:#071412;--panel:rgba(10,24,20,0.92);--text:#f2f0ea;--muted:#8a9e96;--ko:#2dd3a6;--av:#17c6cf;--ru:#ff6b6b;--ca:#f0a050;--um:#b07aff;--dr:#a8c44a;--gold:#f0bf67;--line:rgba(255,255,255,0.06)}
    *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
    body{font-family:Georgia,"Times New Roman",serif;background:var(--bg);color:var(--text)}a{color:inherit;text-decoration:none}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:100;backdrop-filter:blur(14px);background:rgba(7,20,18,0.85);border-bottom:1px solid var(--line)}.topbar-inner{max-width:1180px;margin:0 auto;padding:0 16px;min-height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{font-size:13px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ko);font-weight:700}.nav{display:flex;gap:16px;font-size:13px;color:var(--muted);flex-wrap:wrap}.nav a:hover{color:var(--text)}
    .breadcrumb{position:fixed;top:62px;left:16px;z-index:90;display:flex;gap:6px;align-items:center;font-size:13px;color:var(--muted);pointer-events:auto}.breadcrumb span{cursor:pointer;transition:color 0.2s}.breadcrumb span:hover{color:var(--text)}.breadcrumb .sep{color:rgba(255,255,255,0.15);cursor:default}.breadcrumb .current{color:var(--ko)}
    .depth-meter{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:90;display:flex;flex-direction:column;align-items:center;gap:4px}.depth-meter .track{width:3px;height:120px;background:rgba(255,255,255,0.06);border-radius:2px;position:relative}.depth-meter .fill{position:absolute;top:0;left:0;width:100%;border-radius:2px;background:linear-gradient(180deg,var(--ko),var(--av));transition:height 0.5s ease}.depth-meter .label{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;writing-mode:vertical-rl;margin-top:8px}
    .back-btn{position:fixed;bottom:24px;left:24px;z-index:90;padding:10px 18px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid var(--line);color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.2s;font-family:inherit}.back-btn:hover{border-color:var(--ko);color:var(--text)}
    .universe{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;cursor:grab}.universe:active{cursor:grabbing}
    .stars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
    .stage{position:absolute;top:50%;left:50%;transform-origin:center center;pointer-events:none}
    .surface-title{position:absolute;text-align:center;pointer-events:none;transform:translate(-50%,-50%);top:-180px;left:0;width:600px;transition:opacity 0.5s ease}.surface-title h1{font-size:42px;letter-spacing:-0.03em;line-height:1;background:linear-gradient(135deg,var(--ko),var(--av));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}.surface-title p{font-size:16px;color:var(--muted)}
    .node{position:absolute;border-radius:50%;cursor:pointer;pointer-events:auto;transition:transform 0.3s ease,box-shadow 0.3s ease,opacity 0.5s ease,filter 0.5s ease}.node:hover{transform:scale(1.15)}.node .glow{position:absolute;inset:-12px;border-radius:50%;opacity:0.3;animation:pulse 3s ease-in-out infinite}.node .core{position:absolute;inset:6px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}.node .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid;opacity:0.5}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:0.25}50%{transform:scale(1.25);opacity:0.45}}
    .sub-node{position:absolute;width:110px;height:110px;border-radius:50%;cursor:pointer;pointer-events:auto;transition:all 0.3s ease;opacity:0}.sub-node.visible{opacity:1}.sub-node:hover{transform:scale(1.12)}.sub-node .sub-core{position:absolute;inset:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;font-weight:600;line-height:1.2;padding:8px}.sub-node .sub-glow{position:absolute;inset:-6px;border-radius:50%;opacity:0.15;animation:pulse 4s ease-in-out infinite}
    .tooltip{position:fixed;z-index:200;max-width:280px;padding:14px 18px;border-radius:14px;background:rgba(7,20,18,0.95);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(12px);font-size:13px;color:var(--text);line-height:1.5;pointer-events:none;opacity:0;transition:opacity 0.2s}.tooltip.show{opacity:1}.tooltip .tt-title{font-weight:700;margin-bottom:4px}.tooltip .tt-desc{color:var(--muted)}
    .detail-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:80;width:min(520px,calc(100vw - 40px));max-height:80vh;overflow-y:auto;padding:36px;border-radius:24px;background:rgba(7,20,18,0.96);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);opacity:0;pointer-events:none;transition:opacity 0.4s ease,transform 0.4s ease}.detail-panel.open{opacity:1;pointer-events:auto}.detail-panel .dp-tongue{font-size:11px;text-transform:uppercase;letter-spacing:0.15em;font-weight:700;margin-bottom:8px}.detail-panel h2{font-size:26px;letter-spacing:-0.02em;margin-bottom:12px}.detail-panel .dp-insight{font-size:15px;color:var(--muted);line-height:1.6;margin-bottom:18px;border-left:2px solid;padding-left:14px}.detail-panel .dp-wave{display:flex;gap:4px;align-items:center;margin-bottom:18px}.detail-panel .dp-wave .dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2)}.detail-panel .dp-wave .dot.filled{border-color:transparent}.detail-panel .dp-wave .wlabel{font-size:12px;color:var(--muted);margin-left:8px}
    .detail-panel .dp-wormholes{margin-top:14px;border-top:1px solid rgba(255,255,255,0.06);padding-top:14px}.detail-panel .dp-wormholes .wh-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px}
    .dp-wormhole-link{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(240,191,103,0.15);cursor:pointer;transition:all 0.25s;margin-bottom:6px}.dp-wormhole-link:hover{border-color:var(--gold);background:rgba(240,191,103,0.06)}.dp-wormhole-link .wh-icon{width:28px;height:28px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;animation:wh-spin 3s linear infinite;flex-shrink:0;color:var(--gold)}.dp-wormhole-link .wh-target{font-size:12px}.dp-wormhole-link .wh-target .wh-tongue{color:var(--gold);font-weight:700}.dp-wormhole-link .wh-target .wh-reason{color:var(--muted);font-size:11px;display:block;margin-top:2px}
    .detail-panel .dp-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,0.1);color:var(--text);transition:all 0.2s;cursor:pointer}.detail-panel .dp-link:hover{border-color:var(--ko)}.detail-panel .dp-close{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;font-family:inherit}.detail-panel .dp-close:hover{color:var(--text)}
    @keyframes wh-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .connections{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}.connections line{stroke-dasharray:6 4;animation:dash 20s linear infinite}@keyframes dash{to{stroke-dashoffset:-200}}
    .wormhole-portal{position:absolute;pointer-events:auto;cursor:pointer;z-index:5}.wormhole-portal .wh-ring-outer{position:absolute;inset:0;border-radius:50%;border:2px solid var(--gold);opacity:0.6;animation:wh-ring-spin 4s linear infinite}.wormhole-portal .wh-ring-inner{position:absolute;inset:4px;border-radius:50%;border:1.5px dashed var(--gold);opacity:0.35;animation:wh-ring-spin 6s linear infinite reverse}.wormhole-portal .wh-core-dot{position:absolute;inset:8px;border-radius:50%;background:radial-gradient(circle,rgba(240,191,103,0.4),transparent 70%)}.wormhole-portal .wh-label{position:absolute;top:100%;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:8px;color:var(--gold);opacity:0.7;text-align:center;margin-top:4px;letter-spacing:0.05em;text-transform:uppercase;pointer-events:none}.wormhole-portal:hover .wh-ring-outer{opacity:1;border-color:#fff}.wormhole-portal:hover .wh-ring-inner{opacity:0.7;border-color:#fff}
    @keyframes wh-ring-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .minimap{position:fixed;bottom:20px;right:20px;z-index:95;width:160px;height:160px;border-radius:14px;background:rgba(7,20,18,0.88);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px);overflow:hidden;cursor:pointer}.minimap canvas{width:100%;height:100%}.minimap .mm-label{position:absolute;top:6px;left:8px;font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);pointer-events:none}.minimap .mm-viewport{position:absolute;border:1.5px solid var(--ko);border-radius:3px;pointer-events:none;transition:all 0.3s ease;box-shadow:0 0 8px rgba(45,211,166,0.3)}
    .site-footer{position:fixed;bottom:0;left:0;right:0;z-index:90;background:rgba(7,20,18,0.8);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:10px 20px;display:flex;justify-content:center;gap:24px;font-size:12px;color:var(--muted)}.site-footer a:hover{color:var(--text)}
    @media(max-width:700px){.surface-title{width:340px;top:-140px}.surface-title h1{font-size:28px}.depth-meter{display:none}.minimap{width:110px;height:110px;bottom:50px}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><a class="brand" href="../index.html">SCBE AETHERMOORE</a><nav class="nav"><a href="../index.html">Home</a> <a href="hub.html">Research Hub</a> <a href="../arena.html">Arena</a> <a href="../demos/index.html">Demos</a> <a href="https://github.com/issdandavis/SCBE-AETHERMOORE" target="_blank">GitHub</a></nav></div></header>
  <div class="breadcrumb" id="breadcrumb"><span onclick="zoomToSurface()">Surface</span></div>

  <div class="universe" id="universe"><canvas class="stars" id="starfield"></canvas><svg class="connections" id="connections"></svg><div class="stage" id="stage"></div></div>

  <div class="detail-panel" id="detailPanel"><button class="dp-close" onclick="closeDetail()">&times;</button><div class="dp-tongue" id="dpTongue"></div><h2 id="dpTitle"></h2><div class="dp-insight" id="dpInsight"></div><div class="dp-wave" id="dpWave"></div><div class="dp-wormholes" id="dpWormholes"></div><a class="dp-link" id="dpLink" target="_blank">Read Full Report &rarr;</a></div>
  <div class="minimap" id="minimap"><canvas id="minimapCanvas"></canvas><span class="mm-label">Map</span><div class="mm-viewport" id="mmViewport"></div></div>
  <footer class="site-footer"><a href="../index.html">Home</a> <a href="hub.html">Research Hub</a> <a href="../demos/index.html">Demos</a> <a href="https://github.com/issdandavis/SCBE-AETHERMOORE" target="_blank">GitHub</a></footer>
